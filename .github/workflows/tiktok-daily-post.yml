name: TikTok daily post (@ex_gambler_kazuki)

# Runs every day at 09:00 UTC = 18:00 JST (6:00 PM). Launch gate skips
# all scheduled runs before LAUNCH_AT_UTC. Manual dispatch ignores the
# gate so the operator can always force a post.
#
# Videos are RE-GENERATED inside the workflow from posts.json each run
# (via the same pipeline.run that produced them locally). This removes
# the need for a large pre-built video bundle in storage.
#
# Required repository secrets:
#   TIKTOK_COOKIES_TXT     Netscape-format cookies for the TikTok account
#                          (auto-mode only)
#   DISCORD_WEBHOOK_URL    Optional Discord webhook for success/failure pings
#
# Required repository variable:
#   POSTING_MODE           "auto" or "manual" (default: manual)

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      force_id:
        description: "Force post a specific id (e.g. 003). Leave empty for next-in-queue."
        required: false
        default: ""
      bypass_launch_gate:
        description: "Set to 'yes' to run before the launch date (for smoke tests)."
        required: false
        default: "no"

permissions:
  contents: write  # needed to commit state.json updates

concurrency:
  group: tiktok-daily-post
  cancel-in-progress: false

env:
  # First scheduled post fires at 2026-05-24 18:00 JST = 09:00 UTC.
  LAUNCH_AT_UTC: "2026-05-24T09:00:00Z"

jobs:
  precheck:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.gate.outputs.go }}
      target: ${{ steps.gate.outputs.target }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.bypass_launch_gate }}" = "yes" ]; then
              echo "manual dispatch with gate bypass"
              echo "go=true" >> "$GITHUB_OUTPUT"
            else
              launch=$(date -u -d "$LAUNCH_AT_UTC" +%s)
              now=$(date -u +%s)
              if [ "$now" -ge "$launch" ]; then
                echo "go=true" >> "$GITHUB_OUTPUT"
              else
                echo "Manual dispatch BEFORE launch - blocked. Use bypass_launch_gate=yes."
                echo "go=false" >> "$GITHUB_OUTPUT"
              fi
            fi
          else
            launch=$(date -u -d "$LAUNCH_AT_UTC" +%s)
            now=$(date -u +%s)
            if [ "$now" -ge "$launch" ]; then
              echo "Past launch ($LAUNCH_AT_UTC) - proceed"
              echo "go=true" >> "$GITHUB_OUTPUT"
            else
              echo "Before launch ($LAUNCH_AT_UTC) - skipping"
              echo "go=false" >> "$GITHUB_OUTPUT"
            fi
          fi

          if [ -n "${{ inputs.force_id }}" ]; then
            echo "target=${{ inputs.force_id }}" >> "$GITHUB_OUTPUT"
          else
            # Read the first un-posted ID from state.json
            target=$(python3 - <<'PY'
          import json, pathlib
          p = pathlib.Path("tiktok/posting/state.json")
          if not p.exists():
              print("000"); raise SystemExit
          d = json.loads(p.read_text())
          posted = set(d.get("posted", []))
          for q in d.get("queue", []):
              if q not in posted:
                  print(q); raise SystemExit
          print("")
          PY
          )
            echo "target=$target" >> "$GITHUB_OUTPUT"
          fi

  post:
    needs: precheck
    if: needs.precheck.outputs.go == 'true' && needs.precheck.outputs.target != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg fonts-noto-cjk \
              open-jtalk open-jtalk-mecab-naist-jdic \
              hts-voice-nitech-jp-atr503-m001

      - name: Install Python deps
        working-directory: tiktok
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install tiktok-uploader

      - name: Generate the day's video
        working-directory: tiktok
        env:
          TTS_BACKEND: open_jtalk
        run: |
          target="${{ needs.precheck.outputs.target }}"
          echo "Generating video for post $target"
          python -m pipeline.run --id "$target" --skip-install
          ls -la output/final/

      - name: Materialize cookies (auto mode only)
        if: ${{ secrets.TIKTOK_COOKIES_TXT != '' && vars.POSTING_MODE == 'auto' }}
        env:
          COOKIES: ${{ secrets.TIKTOK_COOKIES_TXT }}
        run: |
          mkdir -p tiktok/secrets
          printf "%s" "$COOKIES" > tiktok/secrets/cookies.txt
          chmod 600 tiktok/secrets/cookies.txt

      - name: Post the video
        working-directory: tiktok
        env:
          POSTING_MODE: ${{ vars.POSTING_MODE || 'manual' }}
          TIKTOK_USERNAME: ex_gambler_kazuki
          TIKTOK_COOKIES_PATH: ${{ github.workspace }}/tiktok/secrets/cookies.txt
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -m posting.run --id "${{ needs.precheck.outputs.target }}"

      - name: Commit updated state.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet tiktok/posting/state.json; then
            echo "state.json unchanged"
          else
            git add tiktok/posting/state.json
            git commit -m "posting: state.json $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            git push
          fi

      - name: Upload generated video as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: posted-video-${{ needs.precheck.outputs.target }}
          path: tiktok/output/final/${{ needs.precheck.outputs.target }}.mp4
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: posting-log
          path: tiktok/posting/logs/
          if-no-files-found: ignore
          retention-days: 14
